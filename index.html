/* uplog PWA — window.storage を localStorage で実装（チャット外で動かすため） */
(function(){
  if(!window.storage){
    window.storage={
      get:function(k){var v=localStorage.getItem(k);return Promise.resolve(v==null?null:{key:k,value:v});},
      set:function(k,v){var val=(typeof v==="string")?v:JSON.stringify(v);localStorage.setItem(k,val);return Promise.resolve({key:k,value:val});},
      delete:function(k){localStorage.removeItem(k);return Promise.resolve({key:k,deleted:true});},
      list:function(p){var ks=Object.keys(localStorage).filter(function(x){return !p||x.indexOf(p)===0;});return Promise.resolve({keys:ks});}
    };
  }
})();

function downscaleImage(file, max = 480, quality = 0.68) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const scale = Math.min(1, max / Math.max(width, height));
        width = Math.round(width*scale); height = Math.round(height*scale);
        const cv = document.createElement("canvas");
        cv.width = width; cv.height = height;
        cv.getContext("2d").drawImage(img, 0, 0, width, height);
        try { resolve(cv.toDataURL("image/jpeg", quality)); }
        catch { resolve(e.target.result); }
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

function renderCrop(img, frame, view, out){
  const { Fw, Fh }=frame, { baseScale, zoom, ox, oy }=view, k=baseScale*zoom;
  const cv=document.createElement("canvas"); cv.width=out.w; cv.height=out.h;
  const x=cv.getContext("2d"); x.imageSmoothingQuality="high";

}

/* ── シーズン締め処理（完了→履歴へ→次のシーズン、累計は維持） ── */
function buildSeasonSummary(season, records){
  const recs = records || [];
  const success = recs.filter(r => r.success).length;
  const holes = recs.map((r,i) => r.success?-1:i).filter(i => i>=0);
  let longest=0, run=0; for (const r of recs){ if (r.success){ run++; if (run>longest) longest=run; } else run=0; }
  const seasonHours = recs.reduce((a,r) => a+(r.minutes||0), 0)/60;
  const wm = recs.filter(r => r.wakeMin!=null).map(r => r.wakeMin);
  const avgWake = wm.length ? Math.round(wm.reduce((a,b)=>a+b,0)/wm.length) : null;
  return {
    season:season.id, ideal:season.ideal, theme:season.theme, habit:season.habit,
    goal:season.targetTime, targetMin:season.targetMin,
    avg: avgWake!=null ? m2hhmm(avgWake) : null,
    avgMin: season.habit!=="wake" && recs.length ? Math.round(seasonHours*60/recs.length) : null,
    recorded:success, holes, best:longest, seasonHours, attempts:recs.length, inProgress:false, closedAt:Date.now(),
  };
}
const isSeasonComplete = records => (records||[]).length >= SEASON_LEN;

function deriveSc(season, records) {
  const recs = records || [];
  const isWake = season.habit === "wake";
  let streak = 0;
  for (let i = recs.length-1; i >= 0; i--) { if (recs[i].success) streak++; else break; }
  let best = 0, run = 0;
  for (const r of recs) { if (r.success) { run++; if (run > best) best = run; } else run = 0; }
  if (streak > best) best = streak;
  const seasonHours = recs.reduce((a,r) => a + (r.minutes||0), 0) / 60;
  const totalHours = (season.cumHours || 0) + seasonHours;
  const holes  = recs.map((r,i) => (r.success ? -1 : i)).filter(i => i >= 0);
  const photos = recs.map(r => r.photo || null);
  const wakeLog = isWake ? recs.filter(r => r.wakeMin != null).map(r => r.wakeMin) : [];
  const minLog  = !isWake ? recs.map(r => r.minutes || 0) : [];
  const lastWake = isWake && recs.length ? recs[recs.length-1].wakeMin : null;
  return {
    habit:season.habit, ideal:season.ideal, theme:season.theme,
    targetTime:season.targetTime, targetMin:season.targetMin, vowPhoto:season.vowPhoto || null,
    season:season.id, recCount:recs.length, day:recs.length + 1,
    streak, best, totalHours, seasonHours, complete: recs.length >= SEASON_LEN, holes, photos, wakeLog, minLog, lastWake,
  };
}

/* 写真クロップのモーダル（iOS標準クロップ風）。ar>=2 はバナー、=1 はグリッド */
function CropModal({ img, ar, onCancel, onApply }){
  const CFW=320, CFh=Math.round(320/ar);
  const base=Math.max(CFW/img.width, CFh/img.height);
  const [cz,setCz]=useState(1);
  const [coff,setCoff]=useState({ x:(CFW-img.width*base)/2, y:(CFh-img.height*base)/2 });
  const drag=useRef(null);
  const dw=img.width*base*cz, dh=img.height*base*cz;
  const clampO=(o,w=dw,h=dh)=>({ x:Math.min(0,Math.max(CFW-w,o.x)), y:Math.min(0,Math.max(CFh-h,o.y)) });
  function zoomTo(nz){ nz=Math.min(3.5,Math.max(1,nz)); const ow=img.width*base*cz, nw=img.width*base*nz, nh=img.height*base*nz; const cx=CFW/2,cy=CFh/2; const nx=cx-(cx-coff.x)*(nw/ow), ny=cy-(cy-coff.y)*(nw/ow); setCz(nz); setCoff(clampO({x:nx,y:ny},nw,nh)); }
  function down(e){ e.currentTarget.setPointerCapture?.(e.pointerId); drag.current={ id:e.pointerId, sx:e.clientX, sy:e.clientY, ox:coff.x, oy:coff.y, pts:{} }; drag.current.pts[e.pointerId]={x:e.clientX,y:e.clientY}; }
  function move(e){ const d=drag.current; if(!d) return; if(d.pts) d.pts[e.pointerId]={x:e.clientX,y:e.clientY}; const ids=Object.keys(d.pts||{}); if(ids.length>=2){ const [a,b]=ids.slice(0,2).map(k=>d.pts[k]); const dist=Math.hypot(a.x-b.x,a.y-b.y); if(!d.pinchBase) d.pinchBase={dist,z:cz}; else zoomTo(d.pinchBase.z*(dist/d.pinchBase.dist)); return; } if(e.pointerId!==d.id) return; setCoff(clampO({ x:d.ox+(e.clientX-d.sx), y:d.oy+(e.clientY-d.sy) })); }
  function up(e){ const d=drag.current; if(d&&d.pts){ delete d.pts[e.pointerId]; d.pinchBase=null; const left=Object.keys(d.pts); if(left.length===0) drag.current=null; else { const k=left[0]; d.id=+k; d.sx=d.pts[k].x; d.sy=d.pts[k].y; d.ox=coff.x; d.oy=coff.y; } } }
  function apply(){ const ow=ar>=2?1080:1000; onApply(renderCrop(img,{Fw:CFW,Fh:CFh},{baseScale:base,zoom:cz,ox:coff.x,oy:coff.y},{w:ow,h:Math.round(ow/ar)})); }
  const banner = ar>=2;
  return (
    <div style={{ position:"fixed", inset:0, zIndex:300, background:"rgba(2,3,7,0.93)", display:"flex", alignItems:"center", justifyContent:"center", padding:18 }}>
      <div style={{ width:360, maxWidth:"94vw", borderRadius:18, overflow:"hidden", background:"#0B0C14", border:`1px solid ${C.border}`, boxShadow:"0 30px 80px rgba(0,0,0,0.8)" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 14px", borderBottom:`1px solid ${C.border}` }}>
          <button onClick={onCancel} style={{ background:"none", border:"none", cursor:"pointer", fontSize:15, color:C.textMid }}>キャンセル</button>
          <span style={{ fontSize:12, color:C.textSub }}>{banner?"バナーに合わせる":"枠に合わせる"}</span>
          <button onClick={apply} style={{ background:"none", border:"none", cursor:"pointer", fontSize:15, color:C.orange, fontWeight:800 }}>適用</button>
        </div>
        <div style={{ padding:"20px 0", display:"flex", justifyContent:"center", background:"#060710" }}>
          <div onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
            style={{ width:CFW, height:CFh, borderRadius: banner?10:14, overflow:"hidden", position:"relative", background:"#000", touchAction:"none", cursor:"grab", boxShadow:`0 0 0 2px ${C.orange}` }}>
            <img src={img.src} alt="" draggable={false} style={{ position:"absolute", left:coff.x, top:coff.y, width:dw, height:dh, maxWidth:"none", userSelect:"none", pointerEvents:"none" }} />
            <div style={{ position:"absolute", inset:0, pointerEvents:"none", backgroundImage:"linear-gradient(rgba(255,255,255,0.22) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.22) 1px,transparent 1px)", backgroundSize:`${100/3}% ${100/3}%`, opacity:0.5 }} />
            {banner && <>
              <div style={{ position:"absolute", inset:0, background:"linear-gradient(90deg,rgba(8,9,15,0.6),rgba(8,9,15,0.05))", pointerEvents:"none" }} />
              <div style={{ position:"absolute", left:11, top:0, bottom:0, display:"flex", flexDirection:"column", justifyContent:"center", pointerEvents:"none" }}><div style={{ fontSize:8, fontWeight:800, letterSpacing:"0.2em", color:"#fff" }}>DAY 1</div><div style={{ fontSize:10, fontWeight:700, color:"#FFE9D6" }}>決意の日</div></div>
              <span style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)", fontSize:15, pointerEvents:"none", filter:`drop-shadow(0 0 4px ${C.orange})` }}>🔥</span>
            </>}
          </div>
        </div>
        <div style={{ padding:"6px 18px 16px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}><span style={{ fontSize:15, color:C.textSub }}>−</span><input type="range" min={1} max={3.5} step={0.01} value={cz} onChange={e=>zoomTo(parseFloat(e.target.value))} style={{ flex:1, accentColor:C.orange }} /><span style={{ fontSize:15, color:C.textSub }}>＋</span></div>
          <div style={{ textAlign:"center", fontSize:10.5, color:C.textSub, marginTop:6 }}>ドラッグで移動・ピンチ/スライダーで拡大</div>
        </div>
      </div>
    </div>
  );
}

let _setupCtx = null;
function setupUnlock() { try { if (!_setupCtx) _setupCtx = new (window.AudioContext||window.webkitAudioContext)(); if (_setupCtx.state==="suspended") _setupCtx.resume(); } catch {} }
function playIgnite() {
  try {
    if (!_setupCtx) _setupCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx = _setupCtx; if (ctx.state==="suspended") ctx.resume();
    const now = ctx.currentTime;
    const master = ctx.createGain(); master.gain.setValueAtTime(0.9, now); master.connect(ctx.destination);
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(180, now); o.frequency.exponentialRampToValueAtTime(62, now+0.18);
    g.gain.setValueAtTime(0.0001, now); g.gain.exponentialRampToValueAtTime(0.5, now+0.012); g.gain.exponentialRampToValueAtTime(0.0001, now+0.4);
    o.connect(g); g.connect(master); o.start(now); o.stop(now+0.45);
    const dur=1.1, buf=ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate), d=buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const noise=ctx.createBufferSource(); noise.buffer=buf;
    const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.setValueAtTime(400, now); bp.frequency.exponentialRampToValueAtTime(1400, now+0.5); bp.Q.setValueAtTime(0.8, now);
    const ng=ctx.createGain(); ng.gain.setValueAtTime(0.0001, now); ng.gain.exponentialRampToValueAtTime(0.32, now+0.08); ng.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    noise.connect(bp); bp.connect(ng); ng.connect(master); noise.start(now); noise.stop(now+dur);
  } catch {}
}

function Wheel({ values, value, onChange, fmt }) {
  const ref = useRef(null), snapT = useRef(null);
  useLayoutEffect(() => { const el = ref.current; if (!el) return; el.scrollTop = Math.max(0, values.indexOf(value))*ITEM; }, []);
  const handle = () => {
    const el = ref.current; if (!el) return;
    let i = Math.round(el.scrollTop/ITEM); i = Math.max(0, Math.min(values.length-1, i));
    if (values[i] !== value) onChange(values[i]);
    if (snapT.current) clearTimeout(snapT.current);
    snapT.current = setTimeout(() => el.scrollTo({ top:i*ITEM, behavior:"smooth" }), 120);
  };
  return (
    <div style={{ position:"relative", width:70, height:ITEM*VISIBLE, zIndex:1 }}>
      <div ref={ref} onScroll={handle} className="no-scrollbar" style={{ height:"100%", overflowY:"scroll", scrollSnapType:"y mandatory", scrollbarWidth:"none" }}>
        <div style={{ height:PADW }} />
        {values.map(v => {
          const active = v === value;
          return <div key={v} style={{ height:ITEM, scrollSnapAlign:"center", display:"flex", alignItems:"center", justifyContent:"center",
            fontSize: active?27:20, fontWeight: active?800:500, color: active?C.textPri:C.textSub, fontVariantNumeric:"tabular-nums", transition:"all 0.12s" }}>{fmt?fmt(v):v}</div>;
        })}

      <div style={{ position:"absolute", inset:0, pointerEvents:"none", background:`linear-gradient(180deg, ${C.bg} 0%, transparent 38%, transparent 62%, ${C.bg} 100%)` }} />
    </div>
  );
}

function SetupScreen({ onComplete }) {
  const TOTAL = 5;
  const [step, setStep]   = useState(0);
  const [habit, setHabit] = useState("wakeup");
  const [ideal, setIdeal] = useState("");
  const [morning, setMorning] = useState("");
  const [dur, setDur]     = useState(30);
  const [days, setDays]   = useState(Array(7).fill(true));
  const [time, setTime]   = useState({ h:5, m:0 });
  const [notifyOn, setNotify] = useState(true);
  const [photo, setPhoto] = useState(null);
  const [cropImg, setCropImg] = useState(null);
  const [ignited, setIgnited] = useState(false);
  const [burst, setBurst] = useState(0);
  const fileRef = useRef(null);

  const H = habitById(habit);
  const isWake = habit === "wakeup";
  const goalLabel  = isWake ? `目標 ${pad2(time.h)}:${pad2(time.m)} 起床` : `1日 ${dur}分`;
  const whatLabel  = isWake ? (morning || "朝活") : H.label;
  const dowText    = days.filter(Boolean).length===7 ? "毎日" : DOW.filter((_,i) => days[i]).join("・");
  const schedLabel = `${dowText} ${pad2(time.h)}:${pad2(time.m)}${notifyOn?" 🔔":""}`;

  const canNext = () => {
    if (step===1) return ideal.trim().length>0;
    if (step===2 && isWake) return morning.trim().length>0;
    if (step===3) return days.some(Boolean);
    return true;
  };
  const go = d => { setupUnlock(); setStep(s => Math.min(TOTAL-1, Math.max(0, s+d))); };
  const ignite = () => { if (ignited) return; playIgnite(); setIgnited(true); setBurst(k => k+1); };

  async function onPickPhoto(e) { const f = e.target.files && e.target.files[0]; if (!f) return; const reader=new FileReader(); reader.onload=async ev=>{ try{ setCropImg(await loadImage(ev.target.result)); }catch{} }; reader.readAsDataURL(f); e.target.value=""; }

  async function startApp() {
    // 既存シーズン/記録/履歴を読む
    let prevSeason=null, prevRecords=[], history=[];
    try { const g=await window.storage.get(SKEY_SEASON);  if (g && g.value) prevSeason=JSON.parse(g.value); } catch {}
    try { const g=await window.storage.get(SKEY_RECORDS); if (g && g.value) prevRecords=JSON.parse(g.value); } catch {}
    try { const g=await window.storage.get(SKEY_HISTORY); if (g && g.value) history=JSON.parse(g.value); } catch {}
    if (!Array.isArray(history)) history=[];
    if (!Array.isArray(prevRecords)) prevRecords=[];

    let newId=1, cumHours=0;
    if (prevSeason && isSeasonComplete(prevRecords)) {
      // 完了済み → 締めて履歴へ、累計を積み上げ、id+1
      history = [...history, buildSeasonSummary(prevSeason, prevRecords)];
      cumHours = history.reduce((a,e)=>a+(e.seasonHours||0), 0);
      newId = (prevSeason.id||1) + 1;
      try { await window.storage.set(SKEY_HISTORY, JSON.stringify(history)); } catch {}
    } else if (prevSeason) {
      // 初回宣言 / やり直し → 累計は維持（消さない）
      cumHours = prevSeason.cumHours!=null ? prevSeason.cumHours : history.reduce((a,e)=>a+(e.seasonHours||0), 0);
      newId = prevSeason.id || 1;
    }

    const season = {
      id:newId, habit: isWake?"wake":"duration", ideal: ideal.trim() || whatLabel,
      theme: isWake ? (morning || "朝活") : H.label,
      targetTime:`${pad2(time.h)}:${pad2(time.m)}`, targetMin:dur,
      days, notifyOn, vowPhoto: photo, cumHours, startDate: Date.now(),
    };
    try { await window.storage.set(SKEY_SEASON, JSON.stringify(season)); } catch {}
    try { await window.storage.set(SKEY_RECORDS, JSON.stringify([])); } catch {}
    onComplete && onComplete();
  }

  const titles = [
    { t:"まず、続けることを1つ", s:"看板は早起き。中身は、続けたいこと全部。" },
    { t:"なりたい理想の自分", s:"「〜な自分」「〜する自分」の形で。これが主役。" },
    isWake ? { t:"朝、何をする？", s:"起きてやりたいことを、自分の言葉で。" } : { t:"1回の目標時間", s:"これに届いたら、その日は成功。" },
    isWake ? { t:"曜日と、起床時間", s:"アラームみたいに、サッと決める。" } : { t:"曜日と、やる時間", s:"アラームみたいに、サッと決める。" },
    { t:"これで、決意する", s:"今日が Day 1。決意の日。" },
  ];
  const renderStep = () => {
    switch (step) {

let _homeCtx = null;
function playRecordSound(delay=0) {
  try {
    if (!_homeCtx) _homeCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx = _homeCtx; if (ctx.state==="suspended") ctx.resume();
    const now = ctx.currentTime + delay, len = 2.3;
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.setValueAtTime(-20, now); comp.ratio.setValueAtTime(6, now); comp.attack.setValueAtTime(0.001, now); comp.release.setValueAtTime(0.18, now);
    const master = ctx.createGain(); master.gain.setValueAtTime(1.35, now); comp.connect(master); master.connect(ctx.destination);
    const shaper = ctx.createWaveShaper(); const curve = new Float32Array(512);
    for (let i=0;i<512;i++){ const x=(i/256)-1; curve[i]=Math.tanh(x*3.5); }
    shaper.curve = curve; shaper.oversample="4x"; shaper.connect(comp);
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(170, now); o.frequency.exponentialRampToValueAtTime(50, now+0.2*len);
    g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(1.0, now+0.003); g.gain.exponentialRampToValueAtTime(0.001, now+0.55*len);
    o.connect(g); g.connect(shaper); o.start(now); o.stop(now+0.6*len+0.05);
    const mid = ctx.createOscillator(), mg = ctx.createGain();
    mid.type="square"; mid.frequency.setValueAtTime(320, now); mid.frequency.exponentialRampToValueAtTime(120, now+0.1*len);
    const midLP = ctx.createBiquadFilter(); midLP.type="lowpass"; midLP.frequency.setValueAtTime(1800, now); midLP.frequency.exponentialRampToValueAtTime(500, now+0.12*len);
    mg.gain.setValueAtTime(0, now); mg.gain.linearRampToValueAtTime(0.5, now+0.003); mg.gain.exponentialRampToValueAtTime(0.001, now+0.18*len);
    mid.connect(midLP); midLP.connect(mg); mg.connect(shaper); mid.start(now); mid.stop(now+0.2*len+0.05);
    const click = ctx.createOscillator(), cg = ctx.createGain();
    click.type="triangle"; click.frequency.setValueAtTime(2400, now); click.frequency.exponentialRampToValueAtTime(700, now+0.02);
    cg.gain.setValueAtTime(0.4, now); cg.gain.exponentialRampToValueAtTime(0.001, now+0.03);
    click.connect(cg); cg.connect(master); click.start(now); click.stop(now+0.04);
  } catch {}
}

function WakeChart({ log, targetMin }) {
  const W=300, H=92, pad=6; const vals=log; if (!vals.length) return <div style={{ height:92 }} />;
  const min=Math.min(...vals,targetMin)-8, max=Math.max(...vals,targetMin)+8;
  const x=i => pad + (vals.length===1 ? (W-pad*2)/2 : (i/(vals.length-1))*(W-pad*2));
  const y=v => pad + (1-(v-min)/(max-min))*(H-pad*2);
  const pts=vals.map((v,i)=>`${x(i)},${y(v)}`).join(" "); const tY=y(targetMin);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display:"block" }}>
      <line x1={pad} y1={tY} x2={W-pad} y2={tY} stroke={C.orange} strokeOpacity="0.5" strokeWidth="1" strokeDasharray="4 4" />
      <text x={W-pad} y={tY-5} fontSize="9" fill={C.orange} fillOpacity="0.7" textAnchor="end">目標 {m2hhmm(targetMin)}</text>
      <polyline points={`${pad},${H-pad} ${pts} ${W-pad},${H-pad}`} fill={`${C.orange}14`} stroke="none" />
      <polyline points={pts} fill="none" stroke={C.orange} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />

}
function DurationChart({ log, targetMin }) {

  const tY=pad+(1-targetMin/max)*(H-pad*2);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display:"block" }}>

                <div style={{ flex:1, textAlign:"center", padding:"14px 8px 12px" }}><div style={{ fontSize:22, fontWeight:800, color:C.textPri, fontVariantNumeric:"tabular-nums", letterSpacing:"-0.03em" }}>{Math.round(totalH)}<span style={{ fontSize:11, fontWeight:500, color:C.textSub, marginLeft:2 }}>h</span></div><div style={{ fontSize:9, color:C.textSub, marginTop:3, letterSpacing:"0.1em", textTransform:"uppercase" }}>累計朝活</div></div>
                <div style={{ width:1, background:C.border }} />
                <div style={{ flex:1, textAlign:"center", padding:"14px 8px 12px" }}><div style={{ fontSize:14, fontWeight:800, color:tier.accent, letterSpacing:"0.02em" }}>{tier.label}</div><div style={{ fontSize:9, color:C.textSub, marginTop:5, letterSpacing:"0.12em", textTransform:"uppercase" }}>{tier.id}</div></div>
              </div>
              {next ? (
                <div style={{ padding:"0 14px 13px" }}>
                  <div style={{ height:1, background:C.border, marginBottom:11 }} />
                  <div style={{ height:4, borderRadius:2, background:"#080910", overflow:"hidden" }}><div style={{ height:"100%", width:`${tierPct}%`, background:`linear-gradient(90deg, ${tier.accent}, ${next.accent})`, borderRadius:2, boxShadow:`0 0 10px ${next.accent}88`, transition:"width 0.8s cubic-bezier(0.4,0,0.2,1)" }} /></div>
                  <div style={{ display:"flex", justifyContent:"center", marginTop:8 }}><span style={{ fontSize:11, fontWeight:700, color:next.accent, letterSpacing:"0.04em" }}>あと {Math.max(0, Math.ceil(next.min-totalH))}h で {next.id}</span></div>
                </div>
              ) : <div style={{ textAlign:"center", padding:"0 0 13px", fontSize:11, color:C.gold, opacity:0.6, letterSpacing:"0.1em" }}>✦ 最高格 LEGEND 到達</div>}
            </div>

            <div style={{ marginTop:14, borderRadius:16, background:C.bgCard, border:`1px solid ${C.border}`, padding:"13px 14px 11px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:9 }}>
                <span style={{ fontSize:10, color:C.textSub, letterSpacing:"0.1em", textTransform:"uppercase", fontWeight:700 }}>{sc.habit==="wake"?"起床時刻の推移":"朝活時間の推移"}</span>
                <span style={{ fontSize:9, color:C.textSub, letterSpacing:"0.06em" }}>直近{sc.habit==="wake"?sc.wakeLog.length:sc.minLog.length}回</span>
              </div>
              {sc.habit==="wake" ? <WakeChart log={sc.wakeLog} targetMin={toMin(sc.targetTime)} /> : <DurationChart log={sc.minLog} targetMin={sc.targetMin} />}
            </div>
          </div>
          )}

          <div style={{ padding:"16px 24px 30px", flex:1, display:"flex", flexDirection:"column", justifyContent: phase==="running"?"center":phase==="idle"?"flex-end":"flex-start" }}>
            {phase==="idle" && (
              <div style={{ animation:"fadeUp 0.4s ease" }}>
                {sc.complete ? (
                  <>
                    <button onClick={() => onGoSetup && onGoSetup()} style={{ width:"100%", padding:"18px", borderRadius:18, border:"none", cursor:"pointer", background:`linear-gradient(180deg,#FF7A2E 0%,${C.orange} 100%)`, color:"#fff", fontSize:16, fontWeight:800, letterSpacing:"0.02em", boxShadow:`0 0 24px ${C.orange}44, inset 0 1px 0 rgba(255,255,255,0.3)`, WebkitTapHighlightColor:"transparent", touchAction:"manipulation" }}>次のシーズンへ →</button>
                    <div style={{ textAlign:"center", marginTop:10, fontSize:11, color:C.textSub }}>21回やりきった。次の Day 1 を決意しよう。</div>
                  </>
                ) : (
                  <>
                    <button onClick={startTimer} style={{ width:"100%", padding:"18px", borderRadius:18, border:"none", cursor:"pointer", background:`linear-gradient(180deg,#FF7A2E 0%,${C.orange} 100%)`, color:"#fff", fontSize:16, fontWeight:800, letterSpacing:"0.02em", boxShadow:`0 0 24px ${C.orange}44, inset 0 1px 0 rgba(255,255,255,0.3)`, WebkitTapHighlightColor:"transparent", touchAction:"manipulation" }}>{sc.theme}を始める</button>
                    <div style={{ textAlign:"center", marginTop:10, fontSize:11, color:C.textSub }}>始めるときに押すだけ。終わったら止める。</div>
                  </>
                )}
              </div>
            )}
            {phase==="running" && (
              <div style={{ animation:"fadeUp 0.4s ease" }}>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", marginBottom:16 }}>
                  <div style={{ position:"relative", width:128, height:128, display:"flex", alignItems:"center", justifyContent:"center", marginBottom:6 }}>
                    <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:`1.5px solid ${C.orange}33`, animation:"breathe 3.2s ease-in-out infinite" }} />
                    <div style={{ position:"absolute", inset:12, borderRadius:"50%", background:`radial-gradient(circle, ${C.orange}14 0%, transparent 70%)`, animation:"breathe 3.2s ease-in-out infinite" }} />
                    <div style={{ fontSize:32, fontWeight:800, color:C.textPri, fontVariantNumeric:"tabular-nums", letterSpacing:"-0.02em" }}>{fmtSec(elapsed)}</div>
                  </div>
                  <div style={{ fontSize:11, color:C.textSub, letterSpacing:"0.12em" }}>{sc.theme}に集中中…</div>
                </div>
                <button onClick={stopTimer} style={{ width:"100%", padding:"16px", borderRadius:18, cursor:"pointer", background:"#0D0E18", border:`1px solid ${C.orange}55`, color:C.orange, fontSize:15, fontWeight:800, letterSpacing:"0.04em", WebkitTapHighlightColor:"transparent", touchAction:"manipulation" }}>終了する</button>
              </div>
            )}
            {phase==="input" && (
              <div style={{ animation:"fadeUp 0.4s ease" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 13px", borderRadius:13, background:"#0D0E18", border:`1px solid ${C.border}`, marginBottom:16 }}>
                  <div style={{ fontSize:20, fontWeight:800, color:C.orange, fontVariantNumeric:"tabular-nums" }}>{sessionMin}<span style={{ fontSize:11, color:C.textSub, marginLeft:2 }}>分</span></div>
                  <div style={{ fontSize:11, color:C.textSub, lineHeight:1.5 }}>{sc.theme}に集中した{sc.habit==="duration" && <span style={{ marginLeft:6, color: sessionMin>=sc.targetMin?"#5BC07A":"#C0705B", fontWeight:700 }}>{sessionMin>=sc.targetMin?"目標達成":`あと${sc.targetMin-sessionMin}分`}</span>}</div>
                </div>
                {sc.habit==="wake" && (
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, color:C.textSub, marginBottom:6, letterSpacing:"0.04em" }}>起床時刻 <span style={{ color:C.orange }}>必須</span></div>
                    <label style={{ position:"relative", display:"flex", alignItems:"center", justifyContent:"center", width:"100%", boxSizing:"border-box", height:48, borderRadius:11, background:"#0A0B14", border:`1px solid ${wake?C.border:C.orange+"88"}`, cursor:"pointer" }}>
                      <span style={{ fontSize:16, fontWeight:700, color: wake?C.textPri:C.textSub, fontVariantNumeric:"tabular-nums", letterSpacing:"0.02em" }}>{wake||"タップして選択"}</span>
                      <input type="time" value={wake} onChange={e => setWake(e.target.value)} style={{ position:"absolute", inset:0, width:"100%", height:"100%", opacity:0, border:"none", background:"transparent", cursor:"pointer", colorScheme:"dark" }} />
                    </label>
                    {wake && <div style={{ marginTop:6, fontSize:11, fontWeight:700, color: wake<=sc.targetTime?"#5BC07A":"#C0705B" }}>{wake<=sc.targetTime?`✓ 目標 ${sc.targetTime} を達成`:`目標に届かず（連続が途切れます）`}</div>}
                  </div>
                )}
                <div style={{ marginBottom:14 }}>
                  <div style={{ fontSize:11, color:C.textSub, marginBottom:6, letterSpacing:"0.04em" }}>今朝のひとこと</div>
                  <input value={note} onChange={e => setNote(e.target.value)} placeholder="今日やったことを一言" style={{ width:"100%", boxSizing:"border-box", padding:"11px 13px", borderRadius:11, background:"#0A0B14", border:`1px solid ${C.border}`, color:C.textPri, fontSize:14, outline:"none" }} />
                </div>
                <div style={{ marginBottom:20 }}>
                  <div style={{ fontSize:11, color:C.textSub, marginBottom:6, letterSpacing:"0.04em" }}>写真 <span style={{ color:C.textSub, opacity:0.7 }}>任意 · あとから足してもOK</span></div>
                  {!photoData ? (
                    <button onClick={() => fileRef.current && fileRef.current.click()} style={{ width:"100%", padding:"15px", borderRadius:11, cursor:"pointer", background:"#0A0B14", border:`1.5px dashed ${C.border}`, color:C.textSub, fontSize:13, fontWeight:600 }}>＋ 今朝の写真を撮る / 選ぶ</button>
                  ) : (
                    <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                      <div style={{ width:60, height:60, borderRadius:10, backgroundImage:`url(${photoData})`, backgroundSize:"cover", backgroundPosition:"center", border:`1px solid ${C.border}`, flexShrink:0 }} />
                      <div style={{ fontSize:12, color:C.textPri }}>写真を選びました</div>
                      <button onClick={() => fileRef.current && fileRef.current.click()} style={{ fontSize:11, color:C.orange, background:"none", border:"none", cursor:"pointer", fontWeight:700 }}>変更</button>
                      <button onClick={() => setPhotoData(null)} style={{ marginLeft:"auto", fontSize:11, color:C.textSub, background:"none", border:"none", cursor:"pointer" }}>外す</button>
                    </div>
                  )}
                </div>
                <button onClick={doRecord} disabled={!canRecord} style={{ width:"100%", padding:"18px", borderRadius:18, border:"none", marginTop:"auto", cursor: canRecord?"pointer":"not-allowed", background: canRecord?`linear-gradient(180deg,#FF7A2E 0%,${C.orange} 100%)`:"#1A1B26", color: canRecord?"#fff":C.textSub, fontSize:16, fontWeight:800, letterSpacing:"0.02em", boxShadow: canRecord?`0 0 24px ${C.orange}44, inset 0 1px 0 rgba(255,255,255,0.3)`:"none", transition:"all 0.2s", WebkitTapHighlightColor:"transparent", touchAction:"manipulation" }}>{canRecord?"記録する":"起床時刻を入力してください"}</button>
              </div>
            )}
            {phase==="done" && !overlay && <div style={{ textAlign:"center", color:ss.color, fontSize:12, fontWeight:700, letterSpacing:"0.1em", opacity:0.8, animation:"fadeUp 0.4s ease" }}>今日のマスがハマった</div>}
          </div>
        </div>
        {overlay && (
          <div style={{ position:"absolute", inset:0, zIndex:40, background:"rgba(4,5,10,0.86)", backdropFilter:"blur(6px)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 18px", animation:"overlayIn 0.3s ease" }}>
            <div style={{ fontSize:12, fontWeight:700, letterSpacing:"0.2em", textTransform:"uppercase", color:C.orange, marginBottom:14, animation:"fadeUp 0.4s ease 0.1s both" }}>今日の記録、完了</div>
            <div style={{ animation:"cardRise 0.5s cubic-bezier(0.2,0.7,0.3,1) 0.05s both" }}><MiniShareCard sc={sc} slam={false} /></div>
            <div style={{ display:"flex", gap:10, marginTop:18, width:300, animation:"fadeUp 0.4s ease 0.25s both" }}>
              <button onClick={reset} style={{ flex:1, padding:"14px", borderRadius:14, background:"#0D0E18", border:`1px solid ${C.border}`, color:C.textSub, fontSize:14, fontWeight:700, cursor:"pointer" }}>閉じる</button>
              <button onClick={() => { reset(); onShare && onShare(); }} style={{ flex:2, padding:"14px", borderRadius:14, border:"none", background:`linear-gradient(180deg,#FF7A2E 0%,${C.orange} 100%)`, color:"#fff", fontSize:14, fontWeight:800, letterSpacing:"0.04em", cursor:"pointer", boxShadow:`0 0 20px ${C.orange}55` }}>シェアする →</button>
            </div>
          </div>
        )}
      </div>
      {cropImg && <CropModal img={cropImg} ar={1} onCancel={()=>setCropImg(null)} onApply={url=>{ setPhotoData(url); setCropImg(null); }} />}
    </div>
  );
}

/* ═════════════════════ 画面4：シェアカード（実データ・成功/失敗） ═════════════════════ */

const K = { cardA:"#0B0F18", cardB:"#070A11", border:"#1A2330", steel:"#7E97AE", steelDim:"#3E4D60", ice:"#C2CDDA", text:"#AEB9C7", fail:"#C2697A" };

function ShareCell({ cell, ss, failed, i }) {
  const { status, photo } = cell;
  const base = { aspectRatio:"1", borderRadius:8, position:"relative", overflow:"hidden", animation:`cellPop 0.4s ${i*22}ms cubic-bezier(0.34,1.56,0.64,1) both` };
  if (failed) {
    if (status==="future") return <div style={{ ...base, background:"transparent", border:`1px solid ${K.border}`, opacity:0.4 }} />;
    if (status==="break") return (
      <div style={{ ...base, background:"#05070B", boxShadow:"inset 0 2px 6px rgba(0,0,0,0.9)", border:`1px solid ${K.fail}77` }}>
        <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}><div style={{ width:"40%", height:2, borderRadius:2, background:K.fail, opacity:0.8, transform:"rotate(-45deg)" }} /></div>
      </div>
    );
    if (status==="hole") return <div style={{ ...base, background:"#05070B", boxShadow:"inset 0 2px 6px rgba(0,0,0,0.9)", border:`1px solid ${K.border}` }} />;
    if (photo) return <div style={{ ...base, backgroundImage:`url(${photo})`, backgroundSize:"cover", filter:"grayscale(1) brightness(0.46) contrast(0.95)", boxShadow:`inset 0 0 0 1px ${K.steel}2E` }} />;
    return <div style={{ ...base, background:"radial-gradient(circle at 50% 40%, #161A20, #090C11)", boxShadow:`inset 0 0 0 1px ${K.steel}2E`, display:"flex", alignItems:"center", justifyContent:"center" }}><div style={{ width:4, height:4, borderRadius:"50%", background:K.steelDim }} /></div>;
  }
  if (status==="future") return <div style={{ ...base, background:"transparent", border:`1px solid ${C.border}`, opacity:0.4 }} />;
  if (status==="pending") return <div style={{ ...base, background:"#0A0B14", border:`1.5px dashed ${C.orange}77` }}><div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, color:`${C.orange}cc`, fontWeight:700 }}>今日</div></div>;
  if (status==="hole") return <div style={{ ...base, background:"#06070E", boxShadow:"inset 0 2px 5px rgba(0,0,0,0.85)", border:"1px solid #131119" }}><div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}><div style={{ width:"34%", height:2, borderRadius:2, background:"#23283A" }} /></div></div>;
  const glow = `inset 0 0 0 1px ${ss.glow}66, 0 0 7px ${ss.glow}44`;
  if (photo) return <div style={{ ...base, backgroundImage:`url(${photo})`, backgroundSize:"cover", boxShadow:glow }} />;
  return <div style={{ ...base, background:"radial-gradient(circle at 50% 38%, #1A1016 0%, #0A0B12 72%)", boxShadow:glow, display:"flex", alignItems:"center", justifyContent:"center" }}><div style={{ width:5, height:5, borderRadius:"50%", background:ss.glow, boxShadow:`0 0 6px ${ss.glow}`, opacity:0.75 }} /></div>;
}

function ShareCard({ sc, failed }) {
  const tier = getTier(sc.totalHours);
  const streak = failed ? 0 : sc.streak;
  const ss = getSS(streak);
  const best = sc.best;
  const cells = buildGrid20(sc).map(c => (failed && c.status==="pending") ? { ...c, status:"break" } : c);
  const wokeText = sc.lastWake != null ? `${m2hhmm(sc.lastWake)} 起床` : "";

  if (failed) {
    return (
      <div style={{ position:"relative", borderRadius:20, overflow:"hidden", background:`linear-gradient(180deg,${K.cardA},${K.cardB})`, border:`1px solid ${K.border}`, boxShadow:`inset 0 0 30px ${K.steel}10`, padding:"18px 14px 16px" }}>
        <div style={{ position:"absolute", inset:0, pointerEvents:"none", background:`radial-gradient(ellipse 120% 70% at 50% 0%, ${K.steel}12 0%, transparent 55%)` }} />
        <div style={{ position:"relative" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"0 2px" }}>
            <span style={{ fontSize:11, letterSpacing:"0.3em", color:K.fail, fontWeight:900 }}>MISSION FAILED</span>
            <span style={{ fontSize:9.5, fontWeight:800, letterSpacing:"0.12em", color:K.steelDim, padding:"3px 10px", borderRadius:99, border:`1px solid ${K.border}` }}>{tier.id}（格は落ちない）</span>
          </div>
          <div style={{ padding:"14px 2px 12px" }}>
            <div style={{ fontSize:20, fontWeight:900, color:K.text, lineHeight:1.3, letterSpacing:"-0.02em", opacity:0.9 }}>「{sc.ideal}」</div>
            <div style={{ fontSize:11.5, color:K.steelDim, marginTop:6 }}>目標 {sc.targetTime} · {sc.theme}{wokeText?` — ${wokeText}`:""}</div>
          </div>
          <div>
            <div style={{ position:"relative", borderRadius:10, overflow:"hidden", height:60, marginBottom:6, background:"linear-gradient(120deg,#2A323E,#11151D)", border:`1px solid ${K.border}`, display:"flex", alignItems:"flex-end", justifyContent:"space-between", padding:"0 12px 8px" }}>
              <div style={{ position:"absolute", inset:0, background:"linear-gradient(180deg,rgba(0,0,0,0.1),rgba(0,0,0,0.55))" }} />
              <div style={{ position:"relative", zIndex:1 }}><div style={{ fontSize:9, fontWeight:800, letterSpacing:"0.2em", color:K.steel }}>DAY 1</div><div style={{ fontSize:11, fontWeight:700, color:K.steelDim, marginTop:1 }}>決意の日</div></div>
              <span style={{ position:"relative", zIndex:1, fontSize:18, filter:"grayscale(1)", opacity:0.28 }}>🔥</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6 }}>{cells.map((cell,i) => <ShareCell key={i} cell={cell} ss={ss} failed i={i} />)}</div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", marginTop:16 }}>
            <div style={{ textAlign:"center", padding:"6px 4px" }}><div style={{ fontSize:30, fontWeight:900, color:K.fail, letterSpacing:"-0.03em", fontVariantNumeric:"tabular-nums", animation:"coldPulse 2.4s ease-in-out infinite" }}>0</div><div style={{ fontSize:9, color:K.steelDim, marginTop:2 }}>連続</div><div style={{ fontSize:9, color:K.fail, marginTop:2, opacity:0.85 }}>{sc.streak}日でストップ</div></div>
            <div style={{ textAlign:"center", padding:"6px 4px", borderLeft:`1px solid ${K.border}` }}><div style={{ fontSize:24, fontWeight:800, color:K.ice, letterSpacing:"-0.03em", fontVariantNumeric:"tabular-nums" }}>{best}<span style={{ fontSize:11, color:K.steelDim, fontWeight:500, marginLeft:1 }}>日</span></div><div style={{ fontSize:9, color:K.steelDim, marginTop:3 }}>自己ベスト</div></div>
            <div style={{ textAlign:"center", padding:"6px 4px", borderLeft:`1px solid ${K.border}` }}><div style={{ fontSize:24, fontWeight:800, color:K.ice, letterSpacing:"-0.03em", fontVariantNumeric:"tabular-nums" }}>{Math.round(sc.totalHours)}<span style={{ fontSize:11, color:K.steelDim, fontWeight:500, marginLeft:1 }}>h</span></div><div style={{ fontSize:9, color:K.steelDim, marginTop:3 }}>累計朝活</div></div>
          </div>
          <div style={{ textAlign:"center", marginTop:16 }}><div style={{ fontSize:14, fontWeight:800, color:K.text, letterSpacing:"0.02em" }}>連続が途切れた。また1から。</div><div style={{ fontSize:10.5, color:K.steelDim, marginTop:6 }}>— 自己ベストと累計は、消えない —</div><div style={{ fontSize:9.5, color:K.steelDim, letterSpacing:"0.22em", marginTop:10 }}>{APP_NAME}</div></div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position:"relative", borderRadius:20, overflow:"hidden", background:"linear-gradient(180deg,#0C0D17,#080910)", padding:"18px 14px 16px", ...frameStyle(tier) }}>
      <BorderCorners tier={tier} />
      <div style={{ position:"relative" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"0 2px" }}>
          <span style={{ fontSize:10, letterSpacing:"0.18em", color:ss.color, fontWeight:800, textShadow:`0 0 10px ${ss.glow}aa` }}>{ss.id?`${ss.id} · ${streak}日連続`:`${streak}日連続`}</span>
          <span style={{ fontSize:9.5, fontWeight:800, letterSpacing:"0.14em", color:tier.accent, padding:"3px 10px", borderRadius:99, border:`1px solid ${tier.accent}44`, background:`${tier.accent}0C` }}>{tier.id} · {tier.label}</span>
        </div>
        <div style={{ padding:"14px 2px 12px" }}>
          <div style={{ fontSize:20, fontWeight:900, color:C.textPri, lineHeight:1.3, letterSpacing:"-0.02em" }}>「{sc.ideal}」</div>
          <div style={{ fontSize:11.5, color:C.textMid, marginTop:6 }}>目標 {sc.targetTime} · {sc.theme}{wokeText?` — ${wokeText}`:""}</div>
        </div>
        <div>
          <div style={{ position:"relative", borderRadius:10, overflow:"hidden", height:60, marginBottom:6, background: sc.vowPhoto?`url(${sc.vowPhoto})`:BANNER_FALLBACK, backgroundSize:"cover", backgroundPosition:"center", border:`1px solid #FFB07A44`, display:"flex", alignItems:"flex-end", justifyContent:"space-between", padding:"0 12px 8px" }}>
            <div style={{ position:"absolute", inset:0, background:"linear-gradient(180deg,rgba(0,0,0,0.05),rgba(0,0,0,0.5))" }} />
            <div style={{ position:"relative", zIndex:1 }}><div style={{ fontSize:9, fontWeight:800, letterSpacing:"0.2em", color:"#fff" }}>DAY 1</div><div style={{ fontSize:11, fontWeight:700, color:"#FFE9D6", marginTop:1 }}>決意の日</div></div>
            <span style={{ position:"relative", zIndex:1, fontSize:20, filter:`drop-shadow(0 0 8px ${C.orange})`, animation:"flameFlicker 0.9s ease-in-out infinite" }}>🔥</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6 }}>{cells.map((cell,i) => <ShareCell key={i} cell={cell} ss={ss} failed={false} i={i} />)}</div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", marginTop:16 }}>
          <div style={{ textAlign:"center", padding:"6px 4px" }}><div style={{ fontSize:30, fontWeight:900, color:ss.color, letterSpacing:"-0.03em", fontVariantNumeric:"tabular-nums", textShadow:`0 0 14px ${ss.glow}aa` }}>{streak}</div><div style={{ fontSize:9, color:C.textSub, marginTop:2 }}>連続</div></div>

function loadImg(src, timeout=4000) {
  return new Promise(res => {
    if(!src) return res(null);
    const im=new Image(); let done=false; const fin=v=>{ if(!done){done=true; res(v);} };
    im.onload=()=>fin(im); im.onerror=()=>fin(null);
    setTimeout(()=>fin(null), timeout);
    try { im.src=src; } catch { fin(null); }
  });
}
function roundPath(x,a,b,w,h,r){ r=Math.min(r,w/2,h/2); x.beginPath(); x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r); x.arcTo(a+w,b+h,a,b+h,r); x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.closePath(); }
function drawCover(x,img,a,b,w,h,r){

}

function drawCard(canvas, sc, cellImgs, vowImg, grid) {
  const W=1080, PAD=56, IW=W-PAD*2;

  const banH=152;

  // ── レイアウト座標（baseline基準）
  const yState   = 92;
  const yIdeal   = yState + 78;
  const idealBot = yIdeal + (lines.length-1)*lh;
  const ySub     = idealBot + 44;
  const banTop   = ySub + 14;
  const gridTop  = banTop + banH + 26;
  const gridBot  = gridTop + gridH;
  const yStatsN  = gridBot + 76;            // 数字baseline
  const yStatsL  = yStatsN + 36;            // ラベル
  const yLogo    = yStatsL + 50;            // uplog
  const H        = Math.round(yLogo + 30);

  // ── キャンバス確定して描画
  canvas.width=W; canvas.height=H;
  const x=canvas.getContext("2d");
  const tier=getTier(sc.totalHours), ss=getSS(sc.streak), r=tierRank(tier), A=tier.accent;

  x.fillStyle="#070810"; x.fillRect(0,0,W,H);
  const bg=x.createLinearGradient(0,0,0,H); bg.addColorStop(0,"#0C0D17"); bg.addColorStop(1,"#080910"); x.fillStyle=bg; x.fillRect(0,0,W,H);
  if(r>0){ const rg=x.createRadialGradient(W/2,-60,40,W/2,-60,W*0.95); rg.addColorStop(0,hex(A,["00","12","1E","2A","38"][r])); rg.addColorStop(1,"rgba(0,0,0,0)"); x.fillStyle=rg; x.fillRect(0,0,W,H*0.6); }

    const corner=(cx,cy,dx,dy)=>{ x.beginPath(); x.moveTo(cx+dx*L,cy); x.lineTo(cx,cy); x.lineTo(cx,cy+dy*L); x.stroke(); };
    corner(off,off,1,1); corner(W-off,off,-1,1); corner(off,H-off,1,-1); corner(W-off,H-off,-1,-1); x.lineCap="butt"; }

  x.textBaseline="alphabetic";
  // 上段
  x.font="700 28px -apple-system,'Helvetica Neue',sans-serif"; x.fillStyle=ss.color;
  const stateLabel=ss.id?`${ss.id} · ${sc.streak}日連続`:`${sc.streak}日連続`;
  x.save(); x.shadowColor=ss.glow; x.shadowBlur=16; x.textAlign="left"; x.fillText(stateLabel,PAD,yState); x.restore();
  const badge=`${tier.id} · ${tier.label}`; x.font="800 26px -apple-system,sans-serif";

  lines.forEach((ln,i)=>x.fillText(ln,PAD,yIdeal+i*lh));

  // サブ

  x.fillText(sc.habit==="wake"?`目標 ${sc.targetTime} · ${sc.theme}${woke}`:`目標 ${sc.targetMin}分 · ${sc.theme}`, PAD, ySub);

  // バナー
  if(vowImg) drawCover(x,vowImg,PAD,banTop,IW,banH,28); else { x.fillStyle="#7A3F2E"; roundPath(x,PAD,banTop,IW,banH,28); x.fill(); }
  x.save(); roundPath(x,PAD,banTop,IW,banH,28); x.clip(); const ov=x.createLinearGradient(PAD,0,PAD+IW,0); ov.addColorStop(0,"rgba(8,9,15,0.78)"); ov.addColorStop(0.6,"rgba(8,9,15,0.2)"); x.fillStyle=ov; x.fillRect(PAD,banTop,IW,banH); x.restore();
  x.lineWidth=2; x.strokeStyle="#FFB07A55"; roundPath(x,PAD,banTop,IW,banH,28); x.stroke();
  x.textAlign="left"; x.fillStyle="#fff"; x.font="800 24px -apple-system,sans-serif"; x.fillText("DAY 1",PAD+30,banTop+banH/2-6);
  x.fillStyle="#FFE9D6"; x.font="700 34px -apple-system,sans-serif"; x.fillText("決意の日",PAD+30,banTop+banH/2+36);
  x.save(); x.shadowColor=C.orange; x.shadowBlur=18; x.font="56px -apple-system,sans-serif"; x.textAlign="right"; x.fillText("🔥",PAD+IW-26,banTop+banH/2+18); x.restore();

    if(cell.status==="hole"){ x.fillStyle="#06070E"; roundPath(x,cx,cy,cs,cs,rr); x.fill(); x.lineWidth=2; x.strokeStyle="#131119"; roundPath(x,cx,cy,cs,cs,rr); x.stroke(); x.fillStyle="#23283A"; x.fillRect(cx+cs*0.33,cy+cs/2-2,cs*0.34,4); continue; }

  const cw=IW/3;
  const stat=(i,big,bigColor,unit,small,glow)=>{

let _refCtx = null;
function playChime() {
  try {
    if (!_refCtx) _refCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx = _refCtx; if (ctx.state==="suspended") ctx.resume();
    const now = ctx.currentTime; const notes = [523.25,659.25,783.99];
    notes.forEach((f,i) => { const t=now+i*0.12, o=ctx.createOscillator(), g=ctx.createGain();

      o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+1.0); });
  } catch {}
}

function deriveReflect(season, records){
  const recs=records||[];
  const attempts=recs.length;
  const success=recs.filter(r=>r.success).length;
  const holes=recs.map((r,i)=>r.success?-1:i).filter(i=>i>=0);
  let longest=0,run=0; for(const r of recs){ if(r.success){run++; if(run>longest)longest=run;} else run=0; }
  const seasonHours=recs.reduce((a,r)=>a+(r.minutes||0),0)/60;
  const wm=recs.filter(r=>r.wakeMin!=null).map(r=>r.wakeMin);
  const avgWake=wm.length?Math.round(wm.reduce((a,b)=>a+b,0)/wm.length):null;
  const avgMin=season.habit!=="wake"&&recs.length?Math.round(recs.reduce((a,r)=>a+(r.minutes||0),0)/recs.length):null;
  const photos=recs.map(r=>r.photo||null);
  const complete=attempts>=20;
  const cumHours=(season.cumHours!=null)?season.cumHours+seasonHours:seasonHours;
  return { ...season, attempts, success, holes, longest, seasonHours, cumHours, avgWake, avgMin, photos, complete };
}

const normH = e => ({ habit:"wake", goal:"05:00", avg:null, avgMin:null, recorded:0, holes:[], best:0, seasonHours:0, attempts:20, inProgress:false, ...e });
function curSummary(season, records){
  const recs=records||[];
  const success=recs.filter(r=>r.success).length;
  const holes=recs.map((r,i)=>r.success?-1:i).filter(i=>i>=0);
  let longest=0,run=0; for(const r of recs){ if(r.success){run++; if(run>longest)longest=run;} else run=0; }
  const seasonHours=recs.reduce((a,r)=>a+(r.minutes||0),0)/60;
  const wm=recs.filter(r=>r.wakeMin!=null).map(r=>r.wakeMin);
  const avgWake=wm.length?Math.round(wm.reduce((a,b)=>a+b,0)/wm.length):null;
  return { season:season.id, ideal:season.ideal, theme:season.theme, habit:season.habit, goal:season.targetTime, targetMin:season.targetMin,
    avg: avgWake!=null?m2hhmm(avgWake):null, avgMin: season.habit!=="wake"&&recs.length?Math.round(seasonHours*60/recs.length):null,
    recorded:success, holes, best:longest, seasonHours, attempts:recs.length, inProgress: recs.length<20 };
}

function WakeTrend({ entries }){
  const asc=[...entries].filter(e=>e.avg).sort((a,b)=>a.season-b.season);
  if(asc.length<2) return <div style={{ height:96, display:"flex", alignItems:"center", justifyContent:"center", color:C.textSub, fontSize:11 }}>2シーズン以上で推移が出ます</div>;
  const W=326,H=96,pad=8,padR=30,padT=14;
  const vals=asc.map(e=>toMin(e.avg)), goals=asc.map(e=>toMin(e.goal));
  const min=Math.min(...vals,...goals)-6, max=Math.max(...vals,...goals)+6;
  const x=i=>pad+(i/(asc.length-1))*(W-pad-padR);
  const y=v=>padT+(1-(v-min)/(max-min))*(H-padT-10);
  const pts=vals.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display:"block" }}>
      {goals.map((g,i)=><line key={i} x1={x(i)-7} y1={y(g)} x2={x(i)+7} y2={y(g)} stroke={C.orange} strokeOpacity="0.32" strokeWidth="1.4" strokeDasharray="2 2" />)}
      <polyline points={`${x(0)},${H-6} ${pts} ${x(asc.length-1)},${H-6}`} fill={`${C.orange}12`} stroke="none" />
      <polyline points={pts} fill="none" stroke={C.orange} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {vals.map((v,i)=>{ const cl=v<=goals[i], last=i===vals.length-1; return (
        <g key={i}>
          <circle cx={x(i)} cy={y(v)} r={last?3.6:2.4} fill={cl?C.green:C.orange} stroke={last?"#fff":"none"} strokeWidth="1" />
          {(i===0||last)&&<text x={x(i)} y={y(v)-8} fontSize="9" fontWeight="700" fill={cl?C.green:C.orange} textAnchor="middle" fontFamily="-apple-system,sans-serif">{asc[i].avg}</text>}
          <text x={x(i)} y={H-1} fontSize="8" fill={C.textSub} textAnchor="middle" fontFamily="-apple-system,sans-serif">S{asc[i].season}</text>
        </g>
      ); })}
    </svg>
  );
}

let _badgeCtx = null;
function playUnlock() {
  try {
    if (!_badgeCtx) _badgeCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx = _badgeCtx; if (ctx.state==="suspended") ctx.resume();
    const now = ctx.currentTime; const master = ctx.createGain(); master.gain.setValueAtTime(0.8, now); master.connect(ctx.destination);
    [523.25,659.25,783.99,1046.5].forEach((f,i) => { const t=now+i*0.08, o=ctx.createOscillator(), g=ctx.createGain();
      o.type="triangle"; o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.18,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.7);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.75); });
    const dur=1.0, buf=ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate), d=buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const n=ctx.createBufferSource(); n.buffer=buf;
    const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=4000;
    const ng=ctx.createGain(); ng.gain.setValueAtTime(0.0001, now+0.1); ng.gain.exponentialRampToValueAtTime(0.07, now+0.25); ng.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    n.connect(hp); hp.connect(ng); ng.connect(master); n.start(now+0.1); n.stop(now+dur);
  } catch {}
}
function playTick() {
  try {
    if (!_badgeCtx) _badgeCtx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx = _badgeCtx; if (ctx.state==="suspended") ctx.resume();
    const now = ctx.currentTime; const o = ctx.createOscillator(), g = ctx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(330, now); g.gain.setValueAtTime(0.0001, now); g.gain.exponentialRampToValueAtTime(0.1, now+0.01); g.gain.exponentialRampToValueAtTime(0.0001, now+0.18);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.2);
  } catch {}
}
const CURRENT = 187;
const MILES = [
  { days:100,  type:"flame", name:"百日の炎",   en:"100 MORNINGS",  ring:"#C9863C", c1:"#FFB07A", c2:"#FF5C00", desc:"百の朝に、勝った。", date:"2024.04.12" },
  { days:365,  type:"sun",   name:"一年の太陽", en:"365 MORNINGS",  ring:"#FFD700", c1:"#FFE38A", c2:"#FFB020", desc:"一年、朝を味方にした者へ。" },
  { days:1000, type:"star",  name:"千日の暁",   en:"1000 MORNINGS", ring:"#EAF2FF", c1:"#FFFFFF", c2:"#9FC2FF", desc:"千の夜明けを越えた者の称号。" },
];
const rad = a => (a-90)*Math.PI/180;
const ptOn = (cx,cy,r,a) => [cx+Math.cos(rad(a))*r, cy+Math.sin(rad(a))*r];
function Decor({ type, color, gid }) {
  if (type==="flame") return <path d="M50 6 C58 17 62 23 62 30 a12 12 0 1 1 -24 0 C38 23 42 17 50 6 Z" fill={`url(#${gid})`} opacity="0.95" />;
  if (type==="sun") return <g>{Array.from({ length:12 }).map((_,i) => { const a=i*30, [x1,y1]=ptOn(50,50,43,a), [x2,y2]=ptOn(50,50,49.5,a); return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth="2.4" strokeLinecap="round" />; })}</g>;
  return <g>
    {Array.from({ length:16 }).map((_,i) => { const a=i*22.5, long=i%2===0?50:46.5, [x1,y1]=ptOn(50,50,43,a), [x2,y2]=ptOn(50,50,long,a); return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={i%2===0?2.2:1.3} strokeLinecap="round" />; })}
    {[35,90,215,300].map((a,i) => { const [x,y]=ptOn(50,50,47,a); return <path key={i} d={`M${x} ${y-2.4} L${x+2} ${y} L${x} ${y+2.4} L${x-2} ${y} Z`} fill={color} />; })}
  </g>;
}
function Medallion({ m, size, unlocked, current, glow }) {
  const gid = `g${m.days}`, pid = `p${m.days}`;
  const pct = Math.min(current/m.days, 1);
  const R = 41, circ = 2*Math.PI*R;
  const numFont = (m.days>=1000?0.24:0.30)*size;
  const grey = "#2A3340";
  return (
    <div style={{ position:"relative", width:size, height:size, filter: unlocked && glow ? `drop-shadow(0 0 14px ${m.c2}aa)`:"none" }}>
      <svg viewBox="0 0 100 100" width={size} height={size} style={{ display:"block", overflow:"visible" }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={m.c1} /><stop offset="100%" stopColor={m.c2} /></linearGradient>
          <radialGradient id={pid} cx="50%" cy="38%" r="65%"><stop offset="0%" stopColor={unlocked?"#1A1B26":"#0E1219"} /><stop offset="100%" stopColor={unlocked?"#0A0B12":"#070A10"} /></radialGradient>
        </defs>
        {unlocked && <Decor type={m.type} color={m.ring} gid={gid} />}
        <circle cx="50" cy="50" r={R} fill={`url(#${pid})`} />
        <circle cx="50" cy="50" r={R} fill="none" stroke={unlocked?m.ring:grey} strokeWidth={unlocked?2.4:1.8} />
        <circle cx="50" cy="50" r={R-4.5} fill="none" stroke={unlocked?`${m.ring}55`:"#202732"} strokeWidth="0.8" />
        {!unlocked && <circle cx="50" cy="50" r={R} fill="none" stroke={m.c2} strokeWidth="2.6" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} transform="rotate(-90 50 50)" style={{ filter:`drop-shadow(0 0 4px ${m.c2}aa)` }} />}
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
        <div style={{ fontSize:numFont, fontWeight:900, letterSpacing:"-0.04em", lineHeight:1, fontVariantNumeric:"tabular-nums", color: unlocked?"#fff":"#4A576A", textShadow: unlocked?`0 0 12px ${m.c2}88`:"none" }}>{m.days}</div>
        <div style={{ fontSize:0.085*size, fontWeight:700, letterSpacing:"0.1em", marginTop:0.02*size, color: unlocked?m.ring:"#3A4658" }}>DAYS</div>
        {!unlocked && <div style={{ fontSize:0.085*size, marginTop:0.03*size, color:"#46586E" }}>🔒</div>}
      </div>
    </div>
  );
}
function BadgeScreen() {
  const unlockedList = MILES.filter(m => CURRENT >= m.days);
  const defaultIdx = unlockedList.length ? MILES.indexOf(unlockedList[unlockedList.length-1]) : 0;
  const [sel, setSel] = useState(defaultIdx);

  const m = MILES[sel];
  const unlocked = CURRENT >= m.days;
  const pct = Math.min(CURRENT/m.days, 1);
  const remain = Math.max(m.days-CURRENT, 0);
  const feature = i => { const mm=MILES[i]; if (CURRENT>=mm.days) playUnlock(); else playTick(); setSel(i); setAnim(k=>k+1); };
  const replay = () => { if (unlocked) { playUnlock(); setAnim(k=>k+1); } };
  const nextLocked = MILES.find(x => CURRENT < x.days);

    <div style={{ minHeight:"100vh", background:"#04050A", display:"flex", flexDirection:"column", alignItems:"center", padding:"20px 0 60px", fontFamily:"-apple-system,'Helvetica Neue',sans-serif" }}>
      <PhoneShell h={800}>
        <div style={{ position:"absolute", inset:0, zIndex:0, pointerEvents:"none", background: unlocked?`radial-gradient(ellipse 90% 45% at 50% 22%, ${m.c2}1E 0%, transparent 60%)`:"transparent", transition:"background 0.6s" }} />
        <div style={{ position:"relative", zIndex:1, display:"flex", flexDirection:"column", flex:1 }}>
          <div style={{ display:"flex", justifyContent:"space-between", padding:"16px 28px 0", fontSize:12, fontWeight:600, color:C.textSub }}><span>9:41</span><div style={{ width:90, height:6, background:"#111", borderRadius:99 }} /><span>称号</span></div>
          <div style={{ padding:"18px 28px 2px", animation:"fadeUp 0.4s ease" }}>
            <div style={{ fontSize:12, color:C.textMid, letterSpacing:"0.04em" }}>累計記録</div>
            <div style={{ display:"flex", alignItems:"baseline", gap:5 }}>
              <span style={{ fontSize:38, fontWeight:900, color:C.textPri, letterSpacing:"-0.03em", fontVariantNumeric:"tabular-nums" }}>{CURRENT}</span>
              <span style={{ fontSize:15, color:C.textSub, fontWeight:600 }}>日</span>
              {nextLocked && <span style={{ marginLeft:"auto", fontSize:11, color:C.textMid }}>「{nextLocked.name}」まで <b style={{ color:nextLocked.c2 }}>あと{nextLocked.days-CURRENT}日</b></span>}

              <div style={{ fontSize:9.5, letterSpacing:"0.28em", color: unlocked?m.ring:C.textSub, fontWeight:800 }}>{m.en}</div>

              <div style={{ fontSize:13, color:C.textMid, marginTop:9, lineHeight:1.5 }}>{m.desc}</div>
              {unlocked ? (
                <div style={{ fontSize:11, color:m.ring, marginTop:12, letterSpacing:"0.06em" }}>✦ {m.date} 達成</div>
              ) : (
                <div style={{ marginTop:14, width:200, marginInline:"auto" }}>
                  <div style={{ height:5, borderRadius:3, background:"#0A0B12", overflow:"hidden" }}><div style={{ height:"100%", width:`${pct*100}%`, background:`linear-gradient(90deg,${m.c1},${m.c2})`, boxShadow:`0 0 8px ${m.c2}aa`, borderRadius:3 }} /></div>

const TABS = [["home","ホーム"],["reflect","振り返り"],["history","履歴"],["badge","称号"]];

function FullOverlay({ title, onClose, children }) {
  return (
    <div style={{ position:"fixed", inset:0, zIndex:500, background:"#04050A", overflowY:"auto", WebkitOverflowScrolling:"touch" }}>
      <div style={{ position:"sticky", top:0, zIndex:3, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 18px", background:"rgba(8,9,15,0.92)", backdropFilter:"blur(10px)", borderBottom:"1px solid #1C1E2E" }}>

}
